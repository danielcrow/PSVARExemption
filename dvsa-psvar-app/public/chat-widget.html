<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSVAR Chat Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "nta", Arial, sans-serif;
        }
        
        #chat-root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="chat-root"></div>
    
    <script>
        // Initialize watsonx Orchestrate chat widget
        window.wxOConfiguration = {
            orchestrationID: "20250430-1552-4383-00f2-8e9318aa2f1b_20250501-1821-5146-80d6-0ef0535f5342",
            hostURL: "https://eu-central-1.dl.watson-orchestrate.ibm.com",
            rootElementID: "chat-root",
            chatOptions: {
                agentId: "a48c5531-927d-423b-b3d6-c20a291ac99a",
                defaultOpen: true,
                hideCloseButton: true,
            }
        };

        // Load the widget script
        const script = document.createElement('script');
        script.src = window.wxOConfiguration.hostURL + '/wxochat/wxoLoader.js?embed=true';
        script.addEventListener('load', function() {
            if (window.wxoLoader) {
                window.wxoLoader.init();
                
                // Auto-click the widget button after a short delay to ensure it's loaded
                setTimeout(() => {
                    // Try to find and click the widget's open button
                    const widgetButton = document.querySelector('[data-testid="chat-launcher-button"]') ||
                                       document.querySelector('button[aria-label*="chat"]') ||
                                       document.querySelector('.wxo-chat-launcher') ||
                                       document.querySelector('button');
                    
                    if (widgetButton) {
                        widgetButton.click();
                        console.log('Auto-opened chat widget');
                    } else {
                        console.log('Widget button not found, trying again...');
                        // Try again after another delay
                        setTimeout(() => {
                            const btn = document.querySelector('button');
                            if (btn) {
                                btn.click();
                                console.log('Auto-opened chat widget (second attempt)');
                            }
                        }, 1000);
                    }
                }, 500);
            }
        });
        document.head.appendChild(script);
    </script>
</body>
</html>
